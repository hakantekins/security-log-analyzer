server:
  port: 8080

spring:
  application:
    name: security-log-analyzer
  servlet:
    multipart:
      # Maximum size of a single uploaded file
      max-file-size: 50MB
      # Maximum size of the entire multipart request
      max-request-size: 50MB

# ?? SpringDoc / Swagger ????????????????????????????????????????????????????????
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ?? App-level tuning ???????????????????????????????????????????????????????????
app:
  security:
    # Number of failed logins from a single IP that triggers a brute-force alert
    brute-force-threshold: 5
    # Supported MIME types / file extensions for log uploads
    allowed-extensions:
      - .txt
      - .log